zh:
  title: 哈喽～我叫Leah！
  description: 你有可能会更熟悉我的网名，pluie。

  intro:
    hi: 哈喽～我叫<em>Leah</em>!
    alias: 你有可能会更熟悉我的网名，<em>pluie</em>。
    pronouns: 她 · she/her 🏳️‍⚧️    
    desc: >
      我是一名现居<em>德国</em>的开源<em>软件开发者👩‍💻</em
      > 、视觉设计师兼<em>画家👩‍🎨</em
      >，致力于让科技与设计行业对<em>所有人</em>都变得更加开放、友好。
    scroll_down: 向下滑

  desc: |
    喜爱编程、绘画、钻研自己的小众爱好，并且每天不断地去进一步认识自己，并帮助别人一并认识自己。 好笑的是，我在我理应休息的时候反倒工作上最为高效——貌似自己一旦集中精力，就很难让自己的干劲停下来了呢。不清楚这是不是件好事呢（笑

    除此之外还喜欢小动物（小狗小猫小狐狸都很可爱！）、标志锥、历史、哲学、政治、语言学、电子游戏设计、等等。尤其是<abbr title="人类自己编造出来的，而非自然演化出来的语言">人造语言（conlangs）</abbr>，相当的有意思呢～

    我也经常会去过度分析一些玩过的，叙事元素强的电子游戏，分析着分析着，就有些时候会关于这些游戏写一些评测文章。虽然我还不是很专业，但我还是会尽力去剖析，这些游戏是怎么打动我的呢！

